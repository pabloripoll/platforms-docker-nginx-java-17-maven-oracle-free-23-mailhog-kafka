services:

  oracle-db:
    image: gvenzl/oracle-free:23-slim-faststart
    container_name: ${COMPOSE_PROJECT_LEAD}-${COMPOSE_PROJECT_NAME}
    deploy:
      resources:
        limits:
          cpus: ${COMPOSE_PROJECT_CPUS}
          memory: ${COMPOSE_PROJECT_MEM}
    environment:
      - ORACLE_PDB=${ORACLE_PLUGGABLE_DB_NAME:-FREEPDB1}
      - ORACLE_PASSWORD=${ORACLE_DATABASE_PASSWORD}
    tty: true
    restart: unless-stopped
    volumes:
      - oracle_data:/opt/oracle/oradata

volumes:
  oracle_data:
    driver: local