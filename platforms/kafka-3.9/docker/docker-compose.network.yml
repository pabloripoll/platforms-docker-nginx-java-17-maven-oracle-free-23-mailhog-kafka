services:

  mongo:
    ports:
      - ${COMPOSE_PROJECT_HOST}:${COMPOSE_PROJECT_PTEXT}:9092   # External access from your host machine:docker-port
      # - ${COMPOSE_PROJECT_HOST}:${COMPOSE_PROJECT_PCTRL}:9093 # optional: expose controller if you really need it
    networks:
      net: {}

networks:
  net:
    driver: bridge
    external: true
    name: ${COMPOSE_PROJECT_LEAD}-${COMPOSE_PROJECT_CNET}
  default:
    external: true
    name: ${COMPOSE_PROJECT_LEAD}-${COMPOSE_PROJECT_CNET}